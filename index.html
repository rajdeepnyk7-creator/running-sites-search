<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Sites Directory</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-container { margin-top: 30px; margin-bottom: 50px; }
        .header-section { background: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .filter-label { font-weight: 600; color: #495057; }
        .btn-pdf { background-color: #dc3545; color: white; border-radius: 20px; font-size: 0.8rem; padding: 5px 15px; text-decoration: none; }
        .btn-pdf:hover { background-color: #bb2d3b; color: white; }
        table thead { background-color: #212529; color: white; }
    </style>
</head>
<body>

<div class="container-fluid main-container">
    <div class="header-section">
        <h2 class="text-primary text-center mb-4">Running Sites Search Portal</h2>
        
        <div class="row g-3">
            <div class="col-md-4">
                <label class="filter-label">Search by TP Scheme:</label>
                <select id="tpDropdown" class="form-select"><option value="">All Schemes</option></select>
            </div>
            <div class="col-md-4">
                <label class="filter-label">Search by Developer:</label>
                <select id="devDropdown" class="form-select"><option value="">All Developers</option></select>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table id="siteTable" class="table table-hover table-bordered w-100">
                    <thead id="tableHead">
                        </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    // 1. Tell the code which file to read
    const CSV_FILE = 'data.csv'; 

    // 2. Load and Parse the CSV
    Papa.parse(CSV_FILE, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            const headers = results.meta.fields;

            // Generate Table Headers
            let headHtml = '<tr>';
            headers.forEach(h => headHtml += `<th>${h}</th>`);
            headHtml += '</tr>';
            $('#tableHead').html(headHtml);

            // Generate Rows
            let bodyHtml = '';
            data.forEach(row => {
                bodyHtml += '<tr>';
                headers.forEach(h => {
                    let value = row[h] || '';
                    // If cell contains a link, make it a red PDF button
                    if (value.startsWith('http')) {
                        bodyHtml += `<td><a href="${value}" target="_blank" class="btn-pdf">Open PDF</a></td>`;
                    } else {
                        bodyHtml += `<td>${value}</td>`;
                    }
                });
                bodyHtml += '</tr>';
            });
            $('#tableBody').html(bodyHtml);

            // 3. Initialize the Search/Filter Engine (DataTables)
            const table = $('#siteTable').DataTable({
                responsive: true,
                pageLength: 15,
                language: { search: "Quick Search Any Column:" }
            });

            // 4. Fill the Dropdown Menus
            const schemes = [...new Set(data.map(item => item['T.P SCHEME NUMBER']))].filter(Boolean).sort();
            schemes.forEach(s => $('#tpDropdown').append(`<option value="${s}">${s}</option>`));

            const developers = [...new Set(data.map(item => item['DEVELOPER NAME']))].filter(Boolean).sort();
            developers.forEach(d => $('#devDropdown').append(`<option value="${d}">${d}</option>`));

            // 5. Connect Dropdowns to the Table
            $('#tpDropdown').on('change', function() {
                table.column(7).search(this.value).draw(); // TP Scheme is column 7
            });
            $('#devDropdown').on('change', function() {
                table.column(18).search(this.value).draw(); // Developer Name is column 18
            });
        }
    });
</script>

</body>
</html>
